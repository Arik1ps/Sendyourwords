<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Night Letter 🌌</title>

  <style>
body {
  margin: 0;
  background: linear-gradient(to top, #0f2027, #203a43, #2c5364);
  font-family: sans-serif;
  overflow: hidden;
  height: 100vh;
}

.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ✅ responsive scene */
.scene {
  position: relative;
  width: 90vw;
  max-width: 320px;
}

/* 💌 Envelope */
.envelope {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 2;
  background: #1c1c1c;
  border-radius: 0 0 10px 10px;
  cursor: pointer;
  perspective: 1000px;
  z-index: 10;
  transition: box-shadow 0.5s;
}

.envelope {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 2;
  background: #1c1c1c;
  border-radius: 0 0 10px 10px;
  cursor: pointer;
  perspective: 1000px;
  z-index: 10;
  transition: box-shadow 0.5s;

  overflow: hidden; /* ✅ THIS FIXES IT */
}

/* flap */
.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 100%;
  background: #333;
  clip-path: polygon(0 0, 50% 60%, 100% 0);
  transform-origin: top;
  transition: transform 0.8s ease, z-index 0.8s;
  z-index: 6;
}

.letter {
  position: absolute;
  width: 90%;
  height: 75%;
  background: white;
  left: 1.5%;
  bottom: 0;
  border-radius: 8px;
  padding: 12px;

  transform: translateY(100%);
  transition: transform 0.8s ease;

  overflow-y: auto;
  font-size: 14px;
}

/* open */
.envelope.open .flap {
  transform: rotateX(180deg);
  z-index: 1;
}

.envelope.open .letter {
  transform: translateY(-10%);
  z-index: 8;
}

.envelope.open {
  box-shadow: 0 0 40px rgba(255,255,255,0.2);
}

/* ⭐ stars */
.stars span {
  position: fixed;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
  z-index: 1;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* 🌠 shooting star */
.shooting-star {
  position: fixed;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  z-index: 5;
  box-shadow: 0 0 10px white;
  animation: shoot linear forwards;
  pointer-events: none;
}

.shooting-star::after {
  content: "";
  position: absolute;
  top: 50%;
  right: 0;
  transform: translateY(-50%);
  width: 150px;
  height: 2px;
  background: linear-gradient(to left, rgba(255,255,255,1), transparent);
  filter: blur(1px);
}

@keyframes shoot {
  0% {
    transform: translate(0, 0) rotate(var(--angle));
    opacity: 1;
  }
  100% {
    transform: translate(var(--dx), var(--dy)) rotate(var(--angle));
    opacity: 0;
  }
}

/* 🌙 MOON (✨ upgraded) */
.moon {
  position: absolute;
  top: 8%;
  left: 10%;
  width: 60px;
  height: 60px;
  border-radius: 50%;

  box-shadow: 12px 12px 0 0 #f0e68c;

  animation: moonGlow 3s ease-in-out infinite alternate,
             moonFloat 6s ease-in-out infinite;

  z-index: 2;
}

/* ✨ glow animation */
@keyframes moonGlow {
  0% {
    filter: drop-shadow(0 0 5px rgba(240,230,140,0.3));
  }
  100% {
    filter: drop-shadow(0 0 20px rgba(240,230,140,0.8));
  }
}

/* 🌙 floating movement */
@keyframes moonFloat {
  0% { transform: translateY(0px) rotate(-15deg); }
  50% { transform: translateY(-10px) rotate(-10deg); }
  100% { transform: translateY(0px) rotate(-15deg); }
}

/* 📱 extra small screens */
@media (max-width: 400px) {
  .letter {
    font-size: 13px;
    padding: 10px;
  }

  .moon {
    width: 50px;
    height: 50px;
    top: 6%;
    left: 8%;
  }
}
  </style>
</head>

<body>

<div class="stars"></div>
<div class="moon"></div>
<div class="container">
  <div class="scene">
    <div class="envelope" onclick="this.classList.toggle('open')">
      <div class="flap"></div>
      <div class="letter">
        <p id="message"></p>
      </div>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-database-compat.js"></script>
<script>
 // TEMP: simulate message from URL
// 🔥 Firebase config (same as main page)
const firebaseConfig = {
  apiKey: "AIzaSyBef7j-VGx409DSvf-cY4ZwGbtgkZ8Y0SY",
  authDomain: "letter-36846.firebaseapp.com",
  databaseURL: "https://letter-36846-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "letter-36846",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ✅ Load message using ID
function loadMessage() {
  let params = new URLSearchParams(window.location.search);
  let id = params.get("id");

  if (!id) {
    document.getElementById("message").innerText = "No letter found 😢";
    return;
  }

  db.ref("letters/" + id).once("value", snapshot => {
    let data = snapshot.val();

    if (data) {
      document.getElementById("message").innerText = data.message;
    } else {
      document.getElementById("message").innerText = "Letter not found 😢";
    }
  });
}

loadMessage();

  // ⭐ Create background stars
  function createStars() {
    let container = document.querySelector(".stars");
    for (let i = 0; i < 120; i++) {
      let star = document.createElement("span");
      let x = Math.random() * window.innerWidth;
      let y = Math.random() * window.innerHeight;
      let size = Math.random() * 2 + 1;

      star.style.left = x + "px";
      star.style.top = y + "px";
      star.style.width = size + "px";
      star.style.height = size + "px";
      star.style.animationDuration = (1 + Math.random() * 3) + "s";
      container.appendChild(star);
    }
  }
  createStars();

  // 🌠 Shooting Star logic
  function createShootingStar() {
    let star = document.createElement("div");
    star.classList.add("shooting-star");

    // Start from upper right side
    let startX = window.innerWidth * (0.6 + Math.random() * 0.4);
    let startY = Math.random() * (window.innerHeight * 0.4);

    star.style.left = startX + "px";
    star.style.top = startY + "px";

    // Movement math
    let distance = 600 + Math.random() * 400;
    let dx = -distance;
    let dy = distance * 0.5; // Controls the downward slope
    
    // Calculate angle so tail points away from movement
    let angle = Math.atan2(dy, dx) * (180 / Math.PI);

    star.style.setProperty("--dx", dx + "px");
    star.style.setProperty("--dy", dy + "px");
    star.style.setProperty("--angle", angle + "deg");

    let duration = 800 + Math.random() * 1000;
    star.style.animationDuration = duration + "ms";

    document.body.appendChild(star);
    setTimeout(() => star.remove(), duration);
  }

  // Random spawn loop
  function randomShoot() {
    if (Math.random() > 0.6) {
        createShootingStar();
    }
    setTimeout(randomShoot, 1500 + Math.random() * 2000);
  }
  randomShoot();
</script>

</body>
</html>
