<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter 💌</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(to top, #ffd1dc, #fff);
      font-family: sans-serif;
      text-align: center;
      /* 2. Prevent horizontal scroll from petals or bouquet */
      overflow-x: hidden; 
    }

    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .scene {
      position: relative;
      /* 3. Ensure the scene fits on small screens */
      width: 100%;
      max-width: 300px;
      height: 200px;
      display: flex;
      justify-content: center;
    }

    .envelope {
      position: relative;
      width: 280px; /* Reduced slightly for narrow phones */
      height: 180px;
      background: #ffb6c1;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      perspective: 1000px;
      z-index: 10;
    }

    .flap {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #ff8fab;
      clip-path: polygon(0 0, 50% 60%, 100% 0);
      transform-origin: top;
      transition: transform 0.8s ease;
      z-index: 2;
      backface-visibility: hidden;
    }

    .letter {
      position: absolute;
      width: 85%;
      height: 140px;
      background: white;
      left: 2.5%; /* Centering fix */
      bottom: 0px;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transform: translateY(100%);
      transition: transform 0.8s ease;
      z-index: 1;
      overflow-y: auto;
      word-wrap: break-word;
      overflow-wrap: break-word;
      font-size: 16px; /* Better mobile readability */
    }

    .envelope.open .flap {
      transform: rotateX(180deg);
    }

    .envelope.open .letter {
      transform: translateY(-10px);
    }

    .petals {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .petals span {
      position: fixed;
      top: -10px;
      font-size: 20px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-10px) translateX(0) rotate(0deg); }
      100% { transform: translateY(100vh) translateX(var(--drift)) rotate(360deg); }
    }

    /* 4. Responsive Bouquet Logic */
.bouquet {
  position: absolute;
  right: 240px;
  bottom: 200px;

  font-size: 100px;

  opacity: 0;
  transform: scale(0.5) rotate(-20deg);
  transition: all 0.6s ease;
}
/* show when open */
.envelope.open + .bouquet {
  opacity: 1;
  transform: scale(1) rotate(0deg);
}
}
.scene {
  position: relative;
  width: 300px;
  height: 200px;
}
  </style>
</head>
<body>

<div class="container">
  <div class="scene">
    <div class="envelope" onclick="openLetter()">
      <div class="flap"></div>
      <div class="letter">
        <p id="message"></p>
      </div>
    </div>
    <div class="bouquet">💐</div>
  </div>
</div>

<div class="petals"></div>

<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-database-compat.js"></script>
<script>
  function openLetter() {
    document.querySelector(".envelope").classList.toggle("open");
  }

  const firebaseConfig = {
    apiKey: "AIzaSyBef7j-VGx409DSvf-cY4ZwGbtgkZ8Y0SY",
    authDomain: "letter-36846.firebaseapp.com",
    databaseURL: "https://letter-36846-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "letter-36846",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function loadMessage() {
    let params = new URLSearchParams(window.location.search);
    let id = params.get("id");

    if (!id) {
      document.getElementById("message").innerText = "No letter found 😢";
      return;
    }

    db.ref("letters/" + id).once("value", snapshot => {
      let data = snapshot.val();
      if (data) {
        document.getElementById("message").innerText = data.message;
      } else {
        document.getElementById("message").innerText = "Letter not found 😢";
      }
    });
  }

  loadMessage();

  function createPetal() {
    let petal = document.createElement("span");
    petal.innerText = "🌸";
    let size = 10 + Math.random() * 20;
    petal.style.fontSize = size + "px";
    petal.style.left = Math.random() * window.innerWidth + "px";
    let duration = 4 + Math.random() * 6;
    petal.style.animationDuration = duration + "s";
    let drift = (Math.random() - 0.5) * 200;
    petal.style.setProperty("--drift", drift + "px");
    document.querySelector(".petals").appendChild(petal);
    setTimeout(() => { petal.remove(); }, duration * 1000);
  }

  setInterval(createPetal, 400); // Slightly slower for performance
</script>
</body>
</html>
